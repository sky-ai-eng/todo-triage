# Triage Factory — multi-mode compose stack.
#
# Brings up Postgres + GoTrue. Local-mode (SQLite) doesn't need any of this.
# The triagefactory container image is a D13 (SKY-256) concern — until then
# the TF binary runs from the host against this stack:
#
#   TF_MODE=multi \
#   TF_GOTRUE_JWKS_URL=http://localhost:9999/.well-known/jwks.json \
#   TF_GOTRUE_ISSUER=${TF_PUBLIC_URL}/auth/v1 \
#   ./triagefactory
#
# Prerequisites — see docs/self-host-setup.md:
#   1. Create a GitHub OAuth app with callback ${TF_PUBLIC_URL}/auth/v1/callback
#   2. cp .env.example .env, fill in the placeholders
#   3. ./triagefactory jwk-init --write-env .env   (writes GOTRUE_JWT_KEYS + GOTRUE_JWT_SECRET)
#   4. docker compose up -d
#
# To rotate the JWT signing key after first boot: remove the existing
# GOTRUE_JWT_KEYS / GOTRUE_JWT_SECRET lines from .env, re-run jwk-init,
# then `docker compose up -d gotrue` (NOT `docker compose start gotrue` —
# the start subcommand reuses the existing container's cached env and the
# new keys would not load).
#
# D6 ships the substrate (gotrue + JWKS verify). D7 (SKY-251) adds the
# OAuth handlers, /api/me, sessions + /auth/v1/* reverse proxy. D13
# (SKY-256) layers in the TF image, admin + https profiles, and final
# operational polish.

services:
  postgres:
    # supabase/postgres ships:
    #   - the `auth` schema + supabase_auth_admin role GoTrue connects as
    #   - vault, pgsodium, pgcrypto, pgvector, pg_graphql extensions
    #     (vault is what D5 / SKY-249 uses for per-org secrets)
    #   - the authenticator / anon / authenticated / service_role pattern
    #     for D9's RLS app pool to lean on
    # Two distinct passwords by design:
    #   POSTGRES_PASSWORD            -> `postgres` superuser (migrations, admin)
    #   SUPABASE_AUTH_ADMIN_PASSWORD -> GoTrue's DB user (auth.* CRUD only)
    # Keeping them separate means a GoTrue compromise doesn't surrender
    # superuser credentials. D9 adds a third password for the `authenticator`
    # role that TF's RLS app pool will use.
    image: supabase/postgres:15.14.1.121
    environment:
      # `${VAR:?msg}` makes compose fail-fast if .env wasn't filled in,
      # so the stack never boots with empty/placeholder passwords.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?missing POSTGRES_PASSWORD (see .env.example)}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Reconciles SUPABASE_AUTH_ADMIN_PASSWORD on every `docker compose up`.
  # ALTER USER is idempotent — re-running with the same value is a no-op;
  # editing .env and `up`ing again rotates the password without wiping
  # the volume. Adds ~200ms to boot.
  #
  # Connects as `supabase_admin` (the image's real superuser; `postgres`
  # is demoted by the image's migrations and supautils blocks non-supers
  # from modifying "reserved" roles like supabase_auth_admin).
  # supabase_admin shares POSTGRES_PASSWORD by image convention — set
  # at initdb, NOT rotatable in-place. See docs/self-host-setup.md.
  postgres-postinit:
    image: supabase/postgres:15.14.1.121
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?missing POSTGRES_PASSWORD (see .env.example)}
      SUPABASE_AUTH_ADMIN_PASSWORD: ${SUPABASE_AUTH_ADMIN_PASSWORD:?missing SUPABASE_AUTH_ADMIN_PASSWORD (see .env.example)}
    entrypoint: ["sh", "-c"]
    # The heredoc with a quoted delimiter ('SQL') skips outer-shell
    # expansion; psql sees the raw \set + backtick-echo, runs the echo
    # in its own sub-shell against the container env (where we placed
    # SUPABASE_AUTH_ADMIN_PASSWORD), and :'auth_admin_password' applies
    # SQL-safe quoting. Equivalent to the official supabase roles.sql.
    command:
      - |
        set -eu
        psql -h postgres -U supabase_admin -d postgres -v ON_ERROR_STOP=1 <<-'SQL'
        \set auth_admin_password `echo "$SUPABASE_AUTH_ADMIN_PASSWORD"`
        ALTER USER supabase_auth_admin WITH LOGIN PASSWORD :'auth_admin_password';
        SQL
    restart: "no"

  gotrue:
    image: supabase/gotrue:v2.189.0
    environment:
      GOTRUE_DB_DRIVER: postgres
      # supabase_auth_admin is pre-provisioned by the supabase/postgres
      # image and already owns the auth schema. Least-privilege fit:
      # GoTrue gets exactly the auth.* CRUD it needs, nothing else.
      # Distinct from POSTGRES_PASSWORD so a GoTrue compromise doesn't
      # also surrender superuser access.
      #
      # NOTE: gobuffalo/pop (GoTrue's DB library) ONLY accepts URL form
      # here, not libpq key=value DSN. That means SUPABASE_AUTH_ADMIN_PASSWORD
      # must use a URL-safe charset — see .env.example and self-host-setup.md
      # for the recommended generator. Reserved URL characters (`/`, `?`, `#`,
      # `@`) in the password will break parsing.
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${SUPABASE_AUTH_ADMIN_PASSWORD:?missing SUPABASE_AUTH_ADMIN_PASSWORD (see .env.example)}@postgres:5432/postgres?search_path=auth
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${TF_PUBLIC_URL:?missing TF_PUBLIC_URL (see .env.example)}/auth/v1
      GOTRUE_JWT_ALGORITHM: RS256
      # GOTRUE_JWT_KEYS (JWKS w/ private+public) is the actual signing
      # material when ALGORITHM=RS256. GOTRUE_JWT_SECRET is still required
      # by config validation even in asymmetric mode (legacy HS256
      # fallback), so do not hard-code it here; load a generated value from
      # `.env` instead. Generated once via
      # `./triagefactory jwk-init --write-env .env` — re-running rotates.
      GOTRUE_JWT_KEYS: ${GOTRUE_JWT_KEYS:?missing GOTRUE_JWT_KEYS (run ./triagefactory jwk-init --write-env .env)}
      GOTRUE_JWT_SECRET: ${GOTRUE_JWT_SECRET:?missing GOTRUE_JWT_SECRET (run ./triagefactory jwk-init --write-env .env)}
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_ISSUER: ${TF_PUBLIC_URL}/auth/v1
      GOTRUE_SITE_URL: ${TF_PUBLIC_URL}
      GOTRUE_URI_ALLOW_LIST: ${TF_PUBLIC_URL}
      GOTRUE_DISABLE_SIGNUP: "false"
      # Email confirmation requires SMTP, which we don't configure in v1
      # (no mail infra dependency). Auto-confirming on signup means a
      # password signup hands back a usable access_token immediately —
      # useful for smoke tests and for self-host without SMTP. GitHub
      # OAuth users are already provider-verified, so this only relaxes
      # the password-signup path.
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_EXTERNAL_GITHUB_ENABLED: "true"
      GOTRUE_EXTERNAL_GITHUB_CLIENT_ID: ${GH_CLIENT_ID:?missing GH_CLIENT_ID (see .env.example step 1)}
      GOTRUE_EXTERNAL_GITHUB_SECRET: ${GH_CLIENT_SECRET:?missing GH_CLIENT_SECRET (see .env.example step 1)}
      # GitHub's own redirect target — must match the OAuth app's
      # authorized-callback config exactly. This is GoTrue's /callback,
      # *not* the TF callback handler (which D7 sets per-request via the
      # `redirect_to` query param on /authorize).
      GOTRUE_EXTERNAL_GITHUB_REDIRECT_URI: ${TF_PUBLIC_URL}/auth/v1/callback
    ports:
      # Exposed so the host-side TF binary can reach JWKS and so GitHub
      # OAuth callbacks can land. D7's reverse proxy moves this behind TF.
      - "9999:9999"
    depends_on:
      postgres: { condition: service_healthy }
      # Wait for the password reconciler so GoTrue's first connection
      # attempt doesn't race against an old/missing password.
      postgres-postinit: { condition: service_completed_successfully }
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9999/health"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pg-data:
