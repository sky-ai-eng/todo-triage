version: "2"

run:
  timeout: 3m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert

  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - unused

formatters:
  enable:
    - gofmt
    - goimports
