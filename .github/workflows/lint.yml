name: lint

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # scripts/lint.sh expects goimports and golangci-lint on PATH.
      # setup-go adds $(go env GOPATH)/bin to PATH, so `go install` lands
      # on PATH automatically; the curl installer drops golangci-lint
      # into the same bin directory.
      - name: Install Go lint tools
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | \
            sh -s -- -b "$(go env GOPATH)/bin"

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Run lint
        run: ./scripts/lint.sh
