name: lint

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # scripts/lint.sh expects goimports and golangci-lint on PATH.
      # setup-go adds $(go env GOPATH)/bin to PATH, so `go install` lands
      # on PATH automatically; the curl installer drops golangci-lint
      # into the same bin directory.
      #
      # Both versions are pinned for reproducible CI — bumping them is
      # a deliberate two-line change. goimports tracks the x/tools
      # version already in go.sum so the dev hook (which uses goimports
      # off PATH) and CI stay aligned. golangci-lint is pinned to a
      # specific v2 patch to match the .golangci.yml `version: "2"`
      # schema; review periodically and bump when convenient.
      - name: Install Go lint tools
        run: |
          go install golang.org/x/tools/cmd/goimports@v0.42.0
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.0.2/install.sh | \
            sh -s -- -b "$(go env GOPATH)/bin" v2.0.2

      - name: Install frontend deps
        run: cd frontend && npm ci

      # frontend/dist must exist before go vet / golangci-lint run because
      # the root package's go:embed directive requires the directory to
      # exist at typecheck time. Without it, both `go vet` and
      # golangci-lint fail with `pattern frontend/dist/*: no matching
      # files found`.
      - name: Build frontend
        run: cd frontend && npm run build

      - name: Run lint
        run: ./scripts/lint.sh
