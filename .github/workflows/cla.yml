name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: read
  pull-requests: write
  checks: write

jobs:
  cla:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request_target') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       (github.event.comment.body == 'recheck' ||
        contains(github.event.comment.body, 'I have read the CLA Document and I hereby sign the CLA')))
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: 3333449
          private-key: ${{ secrets.CLA_APP_PRIVATE_KEY }}

      # Diagnostic: prove what the App token can actually do against the
      # cla-signatures branch. The contributor-assistant failure message
      # ("Resource not accessible by integration") doesn't tell us which
      # token failed or which API call. These checks isolate it.
      - name: Diagnose App token access
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set +e
          echo "::group::App installation identity"
          gh api /installation/repositories --jq '.repositories[].full_name'
          echo "::endgroup::"

          echo "::group::Read cla-signatures branch metadata"
          gh api "/repos/$REPO/branches/cla-signatures" --jq '{name, protected}'
          echo "exit=$?"
          echo "::endgroup::"

          echo "::group::Read signatures/cla.json on cla-signatures"
          gh api "/repos/$REPO/contents/signatures/cla.json?ref=cla-signatures" --jq '{path, sha, size}'
          echo "exit=$?"
          echo "::endgroup::"

          echo "::group::Rate limit (confirms token is an installation token)"
          gh api /rate_limit --jq '.resources.core'
          echo "::endgroup::"

      - uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          path-to-document: "https://github.com/sky-ai-eng/triage-factory/blob/main/docs/CLA.md"
          path-to-signatures: "signatures/cla.json"
          branch: "cla-signatures"
          allowlist: "sky-ai-bot,dependabot[bot],github-actions[bot],claude[bot]"
