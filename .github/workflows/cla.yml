name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: read
  pull-requests: write
  checks: write

jobs:
  cla:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request_target') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       (github.event.comment.body == 'recheck' ||
        contains(github.event.comment.body, 'I have read the CLA Document and I hereby sign the CLA')))
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: 3333449
          private-key: ${{ secrets.CLA_APP_PRIVATE_KEY }}

      # contributor-assistant/github-action only routes signature
      # file writes through PERSONAL_ACCESS_TOKEN when one of
      # remote-organization-name / remote-repository-name is set
      # (see src/persistence/persistence.ts). Without those, it
      # writes via GITHUB_TOKEN, which we deliberately keep at
      # contents: read. We point the "remote" inputs at this repo
      # to force the PAT path so the App token is used.
      #
      # Heads up: this action was archived 2026-03-23. We should
      # migrate to a maintained alternative.
      - uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          path-to-document: "https://github.com/sky-ai-eng/triage-factory/blob/main/docs/CLA.md"
          path-to-signatures: "signatures/cla.json"
          branch: "cla-signatures"
          remote-organization-name: "sky-ai-eng"
          remote-repository-name: "triage-factory"
          allowlist: "AidanAllchin,sky-ai-bot,dependabot[bot],github-actions[bot],claude[bot]"
