name: release-please

# Watches conventional commits on main and maintains an open "Release PR"
# that bumps the version + updates CHANGELOG.md. Merging that PR pushes
# the v* tag, which fires the separate release.yml workflow.
#
# Uses RELEASES_TOKEN (a PAT) instead of the default GITHUB_TOKEN because
# GitHub deliberately suppresses workflow triggers from GITHUB_TOKEN
# events. The PAT-pushed tag DOES trigger release.yml.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          target-branch: main
          token: ${{ secrets.RELEASES_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json
