name: release

# Builds binaries + publishes the Homebrew Formula on every v* tag push.
# Tags come from two sources:
#   1. release-please.yml when a Release PR is merged on main (the
#      automated path).
#   2. A human running `git tag vX.Y.Z && git push origin vX.Y.Z` (the
#      manual escape hatch — use only if release-please is wedged).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean --config .github/goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASES_TOKEN: ${{ secrets.RELEASES_TOKEN }}
